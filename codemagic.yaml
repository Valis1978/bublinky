workflows:
  ios-capacitor:
    name: iOS Build (Capacitor)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bublinky
    environment:
      vars:
        BUNDLE_ID: "cz.bublinky.app"
        XCODE_SCHEME: "App"
        APP_STORE_CONNECT_ISSUER_ID: "ca0ef91e-65b4-4adc-a452-d5c1b590e884"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "SPU39S48DJ"
      node: 22
      xcode: latest
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Update Capacitor iOS project
        script: |
          npx cap sync ios
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles --project "ios/App/App.xcodeproj"
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/App.xcarchive
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
