workflows:
  ios-capacitor:
    name: iOS Build (Capacitor)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bublinky
    environment:
      groups:
        - bublinky-env
        - ios-signing
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "cz.bublinky.app"
        TEAM_ID: "578588C5PF"
      node: v22.0.0
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web assets
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Set up keychain and fetch signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Apply signing profiles to Xcode project
        script: xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Increment build number and build IPA
        script: |
          # Get latest build number from TestFlight
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$BUNDLE_ID" 2>/dev/null || echo 0)
          # Ensure minimum of 3 (we already have builds 1-3)
          if [ "$LATEST_BUILD" -lt 3 ]; then LATEST_BUILD=3; fi
          NEW_BUILD=$(($LATEST_BUILD + 1))
          echo "Latest: $LATEST_BUILD → New: $NEW_BUILD"
          # Build IPA with --build-number override (most reliable method)
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --build-number "$NEW_BUILD" \
            --archive-xcargs="DEVELOPMENT_TEAM=$TEAM_ID" \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
