workflows:
  ios-capacitor:
    name: iOS Build (Capacitor)
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bublinky
    environment:
      groups:
        - bublinky-env
        - ios-signing
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "cz.bublinky.app"
        TEAM_ID: "578588C5PF"
      node: v22.0.0
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web assets
        script: npm run build

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Set up keychain and fetch signing files
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates

      - name: Apply signing profiles to Xcode project
        script: xcode-project use-profiles --project "$XCODE_PROJECT"

      - name: Increment build number and build IPA
        script: |
          # Use Codemagic built-in auto-increment + offset for existing builds
          # PROJECT_BUILD_NUMBER starts at 1 and increments each build
          # We add 10 as offset to avoid conflicts with builds 1-4 already uploaded
          NEW_BUILD=$(($PROJECT_BUILD_NUMBER + 10))
          echo "PROJECT_BUILD_NUMBER=$PROJECT_BUILD_NUMBER → CFBundleVersion=$NEW_BUILD"
          # Patch Info.plist
          PLIST="$CM_BUILD_DIR/ios/App/App/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEW_BUILD" "$PLIST"
          # Patch pbxproj
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*/CURRENT_PROJECT_VERSION = $NEW_BUILD/g" "$CM_BUILD_DIR/$XCODE_PROJECT/project.pbxproj"
          # Build
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs="DEVELOPMENT_TEAM=$TEAM_ID CURRENT_PROJECT_VERSION=$NEW_BUILD" \
            --archive-flags="-destination 'generic/platform=iOS'"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
